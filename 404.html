<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page not found &middot; Liquid &amp; Larder Team Hub</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --line: #262b35;
      --text: #e8eaed;
      --muted: #9aa2b1;
      --accent: #c9a24b;
      --accent-ink: #1a1508;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .code {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 12px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    p {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 15px;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.btn {
      display: inline-block;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 20px;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--text);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.btn:hover { border-color: var(--muted); }
    a.btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }
    a.btn.primary:hover { background: #d8b25c; }
    .foot {
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">Error 404</p>
    <h1>We couldn't find that page</h1>
    <p>The page you're after may have moved or no longer exists. Let's get you back to somewhere useful.</p>
    <div class="actions">
      <a class="btn primary" href="/staff/">Go to the Team Hub</a>
      <a class="btn" href="/">Home</a>
    </div>
    <p class="foot">Liquid &amp; Larder</p>
  </main>
</body>
</html>
