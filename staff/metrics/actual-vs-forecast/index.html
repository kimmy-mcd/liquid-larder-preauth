<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Covers — Actual vs Forecast · Liquid &amp; Larder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="icon" href="/assets/favicon-dark.svg" media="(prefers-color-scheme: dark)">

<style>
  :root { --page-w:1144px; --fc:#b08968; --ac:#1d3e3b; }
  .hidden { display:none; }
  .who { display:flex; align-items:center; gap:12px; }
  .who .back { font-size:11px; color:var(--green); text-decoration:none; background:var(--sand-soft);
    padding:8px 15px; border-radius:999px; font-weight:600; letter-spacing:.04em; }
  .who .back:hover { background:#eae2cf; }
  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--green-hi),var(--green));
    color:#faf8f4; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
  .who .meta { text-align:right; line-height:1.35; }
  .who .meta .n { font-size:12.5px; font-weight:600; }
  .who .meta .r { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.14em; }
  @media (max-width:700px) { .who .meta { display:none; } }

  .pageHead { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-end; gap:16px; margin-bottom:22px; }
  .pageHead h2 { font-family:'Gilda Display',serif; font-weight:400; font-size:29px; color:var(--green); margin-bottom:6px; }
  .pageHead p { color:var(--dim); font-size:12.5px; line-height:1.6; }

  .venueSeg { display:inline-flex; background:var(--card); border:1px solid var(--hairline); box-shadow:var(--shadow-card);
    border-radius:999px; padding:5px; gap:3px; }
  .venueSeg button { border:none; background:transparent; color:var(--dim); font-family:'Gilda Display',serif;
    font-size:14px; padding:9px 20px; border-radius:999px; cursor:pointer; transition:all .16s; box-shadow:none; letter-spacing:.01em;
    text-transform:none; font-weight:400; }
  .venueSeg button.on { background:linear-gradient(180deg,var(--green-hi),var(--green)); color:#faf8f4; box-shadow:0 2px 6px rgba(29,62,59,.24); }

  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; margin-bottom:26px; }
  .kpi { background:var(--card); border:1px solid var(--hairline); border-radius:var(--r-card); box-shadow:var(--shadow-card); padding:20px 22px; position:relative; overflow:hidden; }
  .kpi::before { content:''; position:absolute; inset:0 0 auto 0; height:3px; background:linear-gradient(90deg,var(--sand),rgba(220,209,192,0)); }
  .kpi .lab { font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); font-weight:600; margin-bottom:10px; }
  .kpi .val { font-family:'Gilda Display',serif; font-size:38px; line-height:1; color:var(--green); }
  .kpi .val .u { font-size:18px; color:var(--dim); font-family:'Montserrat',sans-serif; }
  .kpi .delta { display:inline-block; margin-top:10px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; letter-spacing:.02em; }
  .kpi .delta.up { background:rgba(66,112,74,.12); color:var(--ok); }
  .kpi .delta.down { background:rgba(164,78,51,.12); color:var(--err); }
  .kpi .delta.flat { background:var(--sand-soft); color:var(--dim); }
  .kpi .subnote { font-size:10.5px; color:var(--dim); margin-top:8px; }

  .panel { background:var(--card); border:1px solid var(--hairline); border-radius:var(--r-card); box-shadow:var(--shadow-card); padding:24px 26px; }
  .panelHead { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; }
  .panelHead .t { font-family:'Gilda Display',serif; font-size:18px; color:var(--green); }

  .seg { display:inline-flex; background:var(--sand-soft); border-radius:999px; padding:4px; gap:2px; }
  .seg button { border:none; background:transparent; color:var(--dim); font-family:'Montserrat',sans-serif;
    font-weight:600; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; padding:8px 15px;
    border-radius:999px; cursor:pointer; transition:all .16s; box-shadow:none; }
  .seg button.on { background:linear-gradient(180deg,var(--green-hi),var(--green)); color:#faf8f4; box-shadow:0 2px 6px rgba(29,62,59,.24); }

  .chips { display:flex; flex-wrap:wrap; gap:9px; margin-bottom:16px; }
  .chip { display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:500; color:var(--ink);
    background:#fbfaf7; border:1px solid #e6dfd2; padding:7px 13px; border-radius:999px; user-select:none; }
  .chip .dot { width:11px; height:11px; border-radius:50%; flex:none; }

  .tfbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:18px; }
  .tfbar .lead { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); font-weight:600; margin-right:2px; }
  .tfbar select { width:auto; padding:9px 13px; border-radius:999px; font-size:12.5px; }

  .chart-wrap { position:relative; width:100%; height:420px; }
  .loading, .error { display:flex; align-items:center; justify-content:center; height:420px; font-size:13.5px; color:var(--dim); }
  .error { color:var(--err); }

  .footnote { font-size:11px; color:var(--dim); margin-top:16px; line-height:1.6; }
</style>

<div class="wrap" id="wrap" style="display:none;">
  <div class="pageHead">
    <div>
      <h2>Covers &middot; actual vs forecast</h2>
      <p>Actual guests on completed reservations vs forecast &middot; trading week ending Sunday &middot; live from Supabase</p>

    <p class="footnote" id="footnote"></p>

</div>

<script>
// ── auth (accounts project) ───────────────────────────────────────────────
const AUTH_URL  = 'https://lkoqyllmtoodthrtjgfm.supabase.co';
const AUTH_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb3F5bGxtdG9vZHRocnRqZ2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjI4MDAsImV4cCI6MjA5ODk5ODgwMH0.xdPjk-z2HvvLc-mw9b3buZ9Hj1I1ykXFy6cFtRr1isg';
const authSb = supabase.createClient(AUTH_URL, AUTH_ANON);

// ── data (reporting project) ──────────────────────────────────────────────
const DATA_URL  = 'https://fppqqcpgpbdqshhldpth.supabase.co';
const DATA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwcHFxY3BncGJkcXNoaGxkcHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjc0NDYsImV4cCI6MjA5NjkwMzQ0Nn0._T8DALtq5nRQwj-fjPRWbNwhHX_Hv4TJT__tCdzhH8Q';
const dataClient = supabase.createClient(DATA_URL, DATA_ANON, { auth:{ persistSession:false, autoRefreshToken:false } });

const $ = id => document.getElementById(id);
const cssv = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const VENUES = [
  { slug:'gidley',   name:'The Gidley' },
  { slug:'bistecca', name:'Bistecca'   },
  { slug:'alfies',   name:"Alfie's"    },
];

let venue = VENUES[0], period = 'thisfy', chooseFy = null, view = 'weekly', chart = null, metric = 'dining';
const DINING_VENUES = ['alfies'];
const em = () => DINING_VENUES.includes(venue.slug) ? metric : 'total';
const ckey = () => venue.slug + '|' + em();
const __pick = r => { const m=em(); return m==='dining' ? r.dining_covers : (m==='bar' ? r.bar_covers : r.covers_actual); };
const __ac = r => { const v=__pick(r); return v==null?null:+v; };
const __fc = r => (em()==='bar' || r.covers_forecast==null) ? null : +r.covers_forecast;
const __vp = r => { const a=__ac(r), f=__fc(r); return (a==null||f==null||f===0)?null:Math.round((a-f)/f*1000)/10; };
const cache = {};   // slug -> { weekly:[], daily:[] }

// ── date helpers ──────────────────────────────────────────────────────────
const parseD = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const isoD   = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const fmtDM  = d => d.getDate() + ' ' + MONTHS[d.getMonth()];
const fmtDMY = d => d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
const addDays = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
function mondayOf(d) { const x = new Date(d); x.setHours(0,0,0,0); const dow = (x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; }
const fyEndOf = d => (d.getMonth() >= 6 ? d.getFullYear()+1 : d.getFullYear());   // AU FY Jul–Jun
const fyLabel = fe => `FY${fe-1}/${String(fe).slice(2)}`;
const today = () => { const n = new Date(); n.setHours(0,0,0,0); return n; };

// window {start, end, grain, label} for the current period
function windowFor(p) {
  const n = today();
  if (p === 'thisweek') { const s = mondayOf(n); return { start:s, end:addDays(s,6), grain:'daily', label:'This week' }; }
  if (p === 'lastweek') { const s = addDays(mondayOf(n),-7); return { start:s, end:addDays(s,6), grain:'daily', label:'Last week' }; }
  if (p === 'thisquarter') { const q = Math.floor(n.getMonth()/3); const s = new Date(n.getFullYear(), q*3, 1); return { start:s, end:new Date(n.getFullYear(), q*3+3, 0), grain:'weekly', label:`Q${q+1} ${n.getFullYear()}` }; }
  if (p === 'lastquarter') { const q = Math.floor(n.getMonth()/3); const cs = new Date(n.getFullYear(), q*3, 1); const s = new Date(cs.getFullYear(), cs.getMonth()-3, 1); const e = new Date(cs.getFullYear(), cs.getMonth(), 0); return { start:s, end:e, grain:'weekly', label:`Q${(Math.floor(s.getMonth()/3))+1} ${s.getFullYear()}` }; }
  if (p === 'thisfy') { const fe = fyEndOf(n); return { start:new Date(fe-1,6,1), end:new Date(fe,5,30), grain:'weekly', label:fyLabel(fe) }; }
  if (p === 'lastfy') { const fe = fyEndOf(n)-1; return { start:new Date(fe-1,6,1), end:new Date(fe,5,30), grain:'weekly', label:fyLabel(fe) }; }
  if (p === 'choose') { const fe = chooseFy || fyEndOf(n); return { start:new Date(fe-1,6,1), end:new Date(fe,5,30), grain:'weekly', label:fyLabel(fe) }; }
  const fe = fyEndOf(n); return { start:new Date(fe-1,6,1), end:new Date(fe,5,30), grain:'weekly', label:fyLabel(fe) };
}

// ── login gate ────────────────────────────────────────────────────────────
async function gate() {
  const { data:{ session } } = await authSb.auth.getSession();
  if (!session) { location.replace('/staff/'); return false; }
  const { data:{ user } } = await authSb.auth.getUser();
  const { data:profile } = await authSb.from('portal_profiles').select('*').eq('id', user.id).maybeSingle();
  if (!profile || !profile.active) { location.replace('/staff/'); return false; }
  const name = profile.full_name || profile.email;
  $('whoName').textContent = name;
  $('whoRole').textContent = profile.role;
  $('avatar').textContent = (name.match(/\b[a-zA-Z]/g) || [name[0] || '?']).slice(0,2).join('').toUpperCase();
  ['whoMeta','avatar','logout'].forEach(id => $(id).classList.remove('hidden'));
  $('wrap').style.display = 'block';
  return true;
}
$('logout').onclick = async () => { await authSb.auth.signOut(); location.href = '/staff/'; };

// ── venue switcher ────────────────────────────────────────────────────────
function buildVenueSwitcher() {
  const el = $('venueSeg');
  el.innerHTML = VENUES.map(v => `<button data-slug="${v.slug}" class="${v.slug===venue.slug?'on':''}">${v.name}</button>`).join('');
  el.querySelectorAll('button').forEach(b => b.onclick = () => {
    if (b.dataset.slug === venue.slug) return;
    venue = VENUES.find(v => v.slug === b.dataset.slug);
    el.querySelectorAll('button').forEach(x => x.classList.toggle('on', x.dataset.slug===venue.slug));
    syncMetricUI(); load();
  });
}

async function load() {
  $('error').style.display = 'none';
  if (cache[ckey()]) return draw();
  $('chartWrap').style.display = 'none';
  const L = $('loading'); L.style.display = 'flex'; L.textContent = 'Loading ' + venue.name + '…';
  try {
    const [wRes, dRes] = await Promise.all([
      dataClient.rpc('get_actual_vs_forecast', { p_venue: venue.name }),
      dataClient.rpc('get_covers_daily',       { p_venue: venue.name }),
    ]);
    if (wRes.error) throw new Error(wRes.error.message);
    if (dRes.error) throw new Error(dRes.error.message);
    const weekly = (wRes.data||[])
      .filter(r => r.covers_forecast != null || r.covers_actual != null)
      .map(r => ({ wk:r.week_ending, fc:__fc(r),
        ac:__ac(r), vp:__vp(r), note:r.notes||null }))
      .sort((a,b)=>a.wk.localeCompare(b.wk));
    const daily = (dRes.data||[]).map(r => ({ day:r.day, ac:__ac(r) })).sort((a,b)=>a.day.localeCompare(b.day));
    cache[ckey()] = { weekly, daily };
    draw();
  } catch (err) {
    $('loading').style.display = 'none';
    const e = $('error'); e.style.display = 'flex'; e.textContent = 'Could not load data: ' + err.message;
  }
}

function draw() {
  $('loading').style.display = 'none';
  $('chartWrap').style.display = 'block';
  buildPeriodBar();
  const win = windowFor(period);
  buildSeg(win.grain);
  renderKpis(win);
  render(win);
}

// ── period selector ──────────────────────────────────────────────────────
function availFys() {
  const d = cache[ckey()];
  const set = new Set();
  d.weekly.forEach(r => set.add(fyEndOf(parseD(r.wk))));
  d.daily.forEach(r => set.add(fyEndOf(parseD(r.day))));
  return [...set].sort((a,b)=>b-a);
}
function buildPeriodBar() {
  const bar = $('tfBar');
  const fys = availFys();
  if (chooseFy === null) chooseFy = fys[0];
  const opt = (v,l,sel) => `<option value="${v}" ${sel?'selected':''}>${l}</option>`;
  bar.innerHTML = `
    <span class="lead">Period</span>
    <select id="pSelect">
      ${opt('thisweek','This week',period==='thisweek')}
      ${opt('lastweek','Last week',period==='lastweek')}
      ${opt('thisquarter','This quarter',period==='thisquarter')}
      ${opt('lastquarter','Last quarter',period==='lastquarter')}
      ${opt('thisfy','This financial year',period==='thisfy')}
      ${opt('lastfy','Last financial year',period==='lastfy')}
      ${opt('choose','Choose financial year…',period==='choose')}
    </select>
    <select id="pFy" style="display:${period==='choose'?'inline-block':'none'}">${fys.map(f=>opt(f,fyLabel(f),f===chooseFy)).join('')}</select>`;
  $('pSelect').onchange = e => { period = e.target.value; draw(); };
  const f = $('pFy'); if (f) f.onchange = e => { chooseFy = +e.target.value; draw(); };
}

function buildSeg(grain) {
  const opts = grain === 'daily'
    ? [['daily','By day'],['cumulative','Cumulative']]
    : [['weekly','By week'],['variance','Variance'],['cumulative','Cumulative']];
  if (!opts.some(o => o[0] === view)) view = opts[0][0];
  const el = $('seg');
  el.innerHTML = opts.map(o => `<button data-view="${o[0]}" class="${o[0]===view?'on':''}">${o[1]}</button>`).join('');
  el.querySelectorAll('button').forEach(b => b.onclick = () => {
    view = b.dataset.view;
    el.querySelectorAll('button').forEach(x => x.classList.toggle('on', x.dataset.view===view));
    render(windowFor(period));
  });
}

// slice helpers
function weeklyIn(win) { return cache[ckey()].weekly.filter(r => { const d = parseD(r.wk); return d >= win.start && d <= win.end; }); }
function dailyIn(win)  { return cache[ckey()].daily.filter(r => { const d = parseD(r.day); return d >= win.start && d <= win.end; }); }
function dayList(win)  { const out = []; for (let d = new Date(win.start); d <= win.end; d = addDays(d,1)) out.push(new Date(d)); return out; }

// ── KPIs ───────────────────────────────────────────────────────────
function renderKpis(win) {
  const box = $('kpis');
  const cap = today();
  const dm = Object.fromEntries(dailyIn(win).map(r => [r.day, r.ac]));
  const wRows = weeklyIn(win);
  const fcByWeekEnd = {};
  cache[ckey()].weekly.forEach(r => { if (r.fc != null) fcByWeekEnd[r.wk] = r.fc; });
  const weekEndIso = d => isoD(addDays(mondayOf(d), 6));
  const elapsed = dayList(win).filter(d => d <= cap);
  let forecast = 0, havePace = false;
  elapsed.forEach(d => { const fe = fcByWeekEnd[weekEndIso(d)]; if (fe != null) { forecast += fe/7; havePace = true; } });
  forecast = Math.round(forecast);
  const actual = elapsed.reduce((s,d) => s + (dm[isoD(d)] || 0), 0);
  const dv = (havePace && forecast !== 0) ? (actual-forecast)/forecast*100 : null;
  const tradingDays = elapsed.filter(d => (dm[isoD(d)] || 0) > 0).length;
  const avg = tradingDays ? Math.round(actual/tradingDays) : null;
  let busy = null; elapsed.forEach(d => { const v = dm[isoD(d)] || 0; if (v > 0 && (!busy || v > busy.ac)) busy = { day:isoD(d), ac:v }; });
  const partial = period === 'thisweek' || period === 'thisquarter' || period === 'thisfy';
  const tag = d => {
    if (d === null) return '';
    const cls = Math.abs(d) < 0.5 ? 'flat' : (d > 0 ? 'up' : 'down');
    return `<span class="delta ${cls}">${d>0?'+':''}${d.toFixed(1)}% vs forecast</span>`;
  };
  box.innerHTML = `
    <div class="kpi"><div class="lab">${win.label} &middot; actual covers</div>
      <div class="val">${actual.toLocaleString()}</div>${tag(dv)}
      <div class="subnote">${partial?'period in progress':'&nbsp;'}</div></div>
    <div class="kpi"><div class="lab">${win.label} &middot; forecast covers</div>
      <div class="val">${forecast?forecast.toLocaleString():'–'}</div>
      <div class="subnote">${partial?'to date':'full period'}</div></div>
    <div class="kpi"><div class="lab">Avg covers / trading day</div>
      <div class="val">${avg!=null?avg.toLocaleString():'–'}</div>
      <div class="subnote">${tradingDays} trading day${tradingDays===1?'':'s'}</div></div>
    <div class="kpi"><div class="lab">Busiest day</div>
      <div class="val">${busy?busy.ac.toLocaleString():'–'}</div>
      <div class="subnote">${busy?fmtDMY(parseD(busy.day)):'&nbsp;'}</div></div>`;
}

// ── rendering ────────────────────────────────────────────────────────────
function render(win) {
  if (chart) { chart.destroy(); chart = null; }
  if (win.grain === 'daily') {
    if (view === 'cumulative') return renderDailyCumulative(win);
    return renderDaily(win);
  }
  if (view === 'variance')   return renderVariance(win);
  if (view === 'cumulative') return renderWeeklyCumulative(win);
  return renderWeekly(win);
}

function baseX() { return { ticks:{ maxTicksLimit:16, maxRotation:45, font:{size:11}, color:'#646c68' }, grid:{ display:false } }; }
function niceMax(v, step) { return Math.max(step, Math.ceil(v*1.12/step)*step); }
function yAxis(max, step) { return { min:0, max:niceMax(max,step), ticks:{font:{size:11},color:'#646c68',callback:v=>v.toLocaleString()}, grid:{color:'rgba(29,62,59,0.06)'} }; }

// DAILY — actual covers per day + even-pace forecast line (weekly forecast ÷ 7)
function renderDaily(win) {
  $('viewTitle').textContent = 'Covers by day · ' + win.label;
  const days = dayList(win);
  const dm = Object.fromEntries(dailyIn(win).map(r => [r.day, r.ac]));
  const labels = days.map(d => DOW[d.getDay()] + ' ' + d.getDate());
  const acData = days.map(d => dm[isoD(d)] ?? 0);
  const wk = weeklyIn(win).find(r => r.fc != null);
  const pace = wk ? wk.fc/7 : null;
  const paceData = days.map(() => pace);
  const maxv = Math.max(1, ...acData, pace||0);
  const ds = [{ type:'bar', label:'Actual', data:acData, backgroundColor:cssv('--ac')+'d9', borderRadius:3, maxBarThickness:46, order:2 }];
  if (pace != null) ds.push({ type:'line', label:'Forecast pace', data:paceData, borderColor:cssv('--fc'), borderWidth:2, borderDash:[6,4], pointRadius:0, order:1 });
  chart = new Chart($('chart'), {
    data:{ labels, datasets:ds },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'rgba(29,62,59,0.94)', padding:11, cornerRadius:8, usePointStyle:true,
        callbacks:{ title:i=>{ const d=days[i[0].dataIndex]; return DOW[d.getDay()]+' '+fmtDM(d); },
          label:i => '  ' + i.dataset.label + ': ' + Math.round(i.parsed.y).toLocaleString() + (i.dataset.label==='Actual'?' covers':' /day') } } },
      scales:{ x:baseX(), y:yAxis(maxv,50) } }
  });
}

function renderDailyCumulative(win) {
  $('viewTitle').textContent = 'Cumulative covers · ' + win.label;
  const days = dayList(win);
  const dm = Object.fromEntries(dailyIn(win).map(r => [r.day, r.ac]));
  const labels = days.map(d => DOW[d.getDay()] + ' ' + d.getDate());
  const wk = weeklyIn(win).find(r => r.fc != null);
  const pace = wk ? wk.fc/7 : null;
  const nowIso = isoD(today());
  let ca = 0; const aArr = days.map(d => { const k=isoD(d); if (k > nowIso) return null; ca += (dm[k]||0); return ca; });
  let cf = 0; const fArr = days.map(() => pace!=null ? (cf += pace) : null);
  const maxv = Math.max(1, ca, cf);
  const ds = [];
  if (pace != null) ds.push({ label:'Forecast pace', data:fArr, borderColor:cssv('--fc'), backgroundColor:cssv('--fc')+'18', borderWidth:2, borderDash:[5,4], pointRadius:0, pointHoverRadius:4, tension:.2, fill:true, order:2 });
  ds.push({ label:'Actual', data:aArr, borderColor:cssv('--ac'), backgroundColor:cssv('--ac')+'14', borderWidth:2.4, pointRadius:0, pointHoverRadius:4, tension:.2, spanGaps:false, fill:true, order:1 });
  chart = new Chart($('chart'), { type:'line', data:{ labels, datasets:ds },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:cumTip(days) }, scales:{ x:baseX(), y:yAxis(maxv,100) } } });
}

// WEEKLY — forecast bars + actual line
function renderWeekly(win) {
  $('viewTitle').textContent = 'Covers by week · ' + win.label;
  const rows = weeklyIn(win);
  const labels = rows.map(r => fmtDM(parseD(r.wk)));
  const maxv = Math.max(1, ...rows.map(r => Math.max(r.fc||0, r.ac||0)));
  chart = new Chart($('chart'), {
    data:{ labels, datasets:[
      { type:'bar', label:'Forecast', data:rows.map(r=>r.fc), backgroundColor:cssv('--fc')+'55', borderColor:cssv('--fc'), borderWidth:1, borderRadius:2, maxBarThickness:22, order:2 },
      { type:'line', label:'Actual', data:rows.map(r=>r.ac), borderColor:cssv('--ac'), backgroundColor:cssv('--ac'), borderWidth:2.4, pointRadius:2.4, pointHoverRadius:5, tension:.28, spanGaps:false, order:1 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:weekTip(rows,false) }, scales:{ x:baseX(), y:yAxis(maxv,100) } }
  });
}

function renderWeeklyCumulative(win) {
  $('viewTitle').textContent = 'Cumulative covers · ' + win.label;
  const rows = weeklyIn(win);
  const labels = rows.map(r => fmtDM(parseD(r.wk)));
  let ca=0, cf=0; const aArr=[], fArr=[];
  rows.forEach(r => { if (r.ac!=null){ca+=r.ac; aArr.push(ca);} else aArr.push(null); if (r.fc!=null){cf+=r.fc; fArr.push(cf);} else fArr.push(fArr.length?fArr[fArr.length-1]:null); });
  const maxv = Math.max(1, ca, cf);
  chart = new Chart($('chart'), { type:'line', data:{ labels, datasets:[
      { label:'Forecast', data:fArr, borderColor:cssv('--fc'), backgroundColor:cssv('--fc')+'18', borderWidth:2, borderDash:[5,4], pointRadius:0, pointHoverRadius:4, tension:.2, fill:true, order:2 },
      { label:'Actual', data:aArr, borderColor:cssv('--ac'), backgroundColor:cssv('--ac')+'14', borderWidth:2.4, pointRadius:0, pointHoverRadius:4, tension:.2, spanGaps:false, fill:true, order:1 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:weekTip(rows,true) }, scales:{ x:baseX(), y:yAxis(maxv,500) } } });
}

function renderVariance(win) {
  $('viewTitle').textContent = 'Weekly variance · ' + win.label;
  const rows = weeklyIn(win);
  const labels = rows.map(r => fmtDM(parseD(r.wk)));
  const vals = rows.map(r => (r.ac!=null && r.fc!=null && r.fc!==0) ? r.vp : null);
  chart = new Chart($('chart'), { type:'bar', data:{ labels, datasets:[{ label:'Variance %', data:vals,
      backgroundColor:vals.map(v => v==null?'#ccc':(v>=0?cssv('--ok'):cssv('--err'))), borderRadius:2, maxBarThickness:22 }] },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'rgba(29,62,59,0.94)', padding:11, cornerRadius:8,
        callbacks:{ title:i=>'Week ending '+fmtDMY(parseD(rows[i[0].dataIndex].wk)), label:i => '  ' + (i.parsed.y>0?'+':'') + i.parsed.y.toFixed(1) + '% vs forecast' } } },
      scales:{ x:baseX(), y:{ ticks:{ callback:v=>(v>0?'+':'')+v+'%', font:{size:11}, color:'#646c68' }, grid:{color:'rgba(29,62,59,0.06)'} } } } });
}

function weekTip(rows, cumulative) {
  return { backgroundColor:'rgba(29,62,59,0.94)', titleFont:{size:12.5,weight:'600'}, bodyFont:{size:12}, padding:11, cornerRadius:8, usePointStyle:true,
    callbacks:{
      title: i => 'Week ending ' + fmtDMY(parseD(rows[i[0].dataIndex].wk)),
      label: i => { const v = i.parsed.y; return v==null ? '  '+i.dataset.label+': n/a' : '  '+i.dataset.label+': '+Math.round(v).toLocaleString()+' covers'; },
      afterBody: i => { const r = rows[i[0].dataIndex]; const o = [];
        if (!cumulative && r.ac!=null && r.fc!=null && r.fc!==0) o.push('  Variance: '+(r.vp>0?'+':'')+r.vp.toFixed(1)+'%');
        if (r.note) o.push('  '+r.note); return o; } } };
}
function cumTip(days) {
  return { backgroundColor:'rgba(29,62,59,0.94)', padding:11, cornerRadius:8, usePointStyle:true,
    callbacks:{ title:i=>{ const d=days[i[0].dataIndex]; return DOW[d.getDay()]+' '+fmtDM(d); },
      label:i => i.parsed.y==null ? '  '+i.dataset.label+': —' : '  '+i.dataset.label+': '+Math.round(i.parsed.y).toLocaleString()+' covers' } };
}

$('footnote').textContent =
  'Actual covers = guests on completed SevenRooms reservations, by trading day. Forecast covers come from the Liquid & Larder Forecast sheet (a weekly figure). KPIs compare like-for-like to date. "By day" views show actual covers per day with a forecast-pace line (the week’s forecast ÷ 7). Weeks run Monday–Sunday. Walk-ins not entered as reservations are not counted.';

function buildMetricSwitcher(){ let host=document.getElementById('metricSeg'); if(!host){ const row=document.createElement('div'); row.className='metricRow'; row.style.cssText='display:flex;align-items:center;gap:10px;margin:0 0 14px;'; row.innerHTML='<span class="lead">Covers</span><div class="seg" id="metricSeg"></div>'; const kp=document.getElementById('kpis'); kp.parentNode.insertBefore(row, kp); host=document.getElementById('metricSeg'); } const opts=[['dining','Dining room'],['total','Total'],['bar','Bar']]; host.innerHTML=opts.map(o=>`<button data-metric="${o[0]}" class="${o[0]===metric?'on':''}">${o[1]}</button>`).join(''); host.querySelectorAll('button').forEach(b=> b.onclick=()=>{ if(b.dataset.metric===metric) return; metric=b.dataset.metric; host.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x.dataset.metric===metric)); load(); }); }
function syncMetricUI(){ var row=document.querySelector('.metricRow'); if(row) row.style.display = DINING_VENUES.includes(venue.slug) ? 'flex' : 'none'; }
(async () => { if (await gate()) { buildVenueSwitcher(); buildMetricSwitcher(); syncMetricUI(); load(); } })();
</script>
