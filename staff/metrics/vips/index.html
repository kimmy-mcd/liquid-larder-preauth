<style>
  :root { --page-w:1144px; }
  .hidden { display:none !important; }
  .who { display:flex; align-items:center; gap:12px; }
  .who .back { font-size:11px; color:var(--green); text-decoration:none; background:var(--sand-soft); padding:8px 15px; border-radius:999px; font-weight:600; letter-spacing:.04em; }

  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--green-hi),var(--green)); color:#faf8f4; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }

  .controls { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:18px; }
  .seg { display:inline-flex; background:var(--sand-soft); border-radius:999px; padding:4px; gap:2px; }
  .seg button { border:none; background:transparent; color:var(--dim); font-family:'Montserrat',sans-serif; font-weight:600; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:9px 16px; border-radius:999px; cursor:pointer; transition:all .16s; box-shadow:none; }

  /* venue + filter chips */
  .chipbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:18px; }
  .chipbar .lead { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); font-weight:600; margin-right:2px; }
  .vchip { border:1px solid var(--hairline); background:var(--card); color:var(--dim); font-size:11px; font-weight:600; padding:7px 14px; border-radius:999px; cursor:pointer; transition:all .14s; box-shadow:none; letter-spacing:.02em; }
  .vchip:hover { border-color:rgba(29,62,59,.25); }
  .vchip.on { background:linear-gradient(180deg,var(--green-hi),var(--green)); color:#faf8f4; border-color:transparent; }

  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }

  table.vt th { text-align:left; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim); font-weight:600; padding:0 10px 11px; border-bottom:1px solid var(--hairline); white-space:nowrap; }

  .modalHead { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:14px; }
  .modalHead .mt { font-family:'Gilda Display',serif; font-size:22px; color:var(--green); }
  .modalHead .ms { font-size:11.5px; color:var(--dim); margin-top:6px; line-height:1.6; }
  .modalHead button { border:none; background:var(--sand-soft); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:17px; line-height:1; color:var(--dim); flex:none; }

  .mProfile { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; padding:14px 0 4px; border-top:1px solid var(--hairline); margin-bottom:10px; }

  .mStat .v { font-size:14px; color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; }

  .mScroll { max-height:52vh; overflow:auto; }
  table.bk { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.bk th { text-align:left; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim); font-weight:600; padding:0 10px 11px; border-bottom:1px solid var(--hairline); position:sticky; top:0; background:var(--card); }
  table.bk th.num, table.bk td.num { text-align:right; font-variant-numeric:tabular-nums; }
  table.bk td { padding:10px; border-bottom:1px solid #f0ece3; vertical-align:top; }
  table.bk tr:last-child td { border-bottom:none; }
  table.bk .bn { font-weight:600; color:var(--ink); }
  table.bk .bc { font-size:10.5px; color:var(--dim); margin-top:2px; }

  .pill { display:inline-block; font-size:9px; letter-spacing:.07em; text-transform:uppercase; font-weight:600; padding:3px 9px; border-radius:999px; }
  .pill.completed { background:rgba(66,112,74,.12); color:var(--ok); }
  .pill.upcoming { background:rgba(62,106,138,.14); color:#3e6a8a; }
  .pill.other { background:var(--sand-soft); color:var(--dim); }

  /* monthly bar chart */
  .months { display:grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:8px; align-items:end; min-height:160px; }
  .months .mcol { text-align:center; display:flex; flex-direction:column; justify-content:flex-end; height:180px; }
  .months .mn { font-size:10.5px; color:var(--green); font-weight:600; font-variant-numeric:tabular-nums; margin-bottom:6px; }
  .months .mbar { width:100%; background:linear-gradient(180deg,var(--green-hi),var(--green)); border-radius:5px 5px 0 0; min-height:3px; transition:height .2s; }
  .months .ml { font-size:9px; letter-spacing:.04em; text-transform:uppercase; color:var(--dim); font-weight:600; margin-top:8px; }

  .loading, .error { display:flex; align-items:center; justify-content:center; min-height:180px; font-size:13.5px; color:var(--dim); }
  .error { color:var(--err); }
  .footnote { font-size:11px; color:var(--dim); margin-top:22px; line-height:1.7; }
</style>

<script>
// ── auth (accounts project) ───────────────────────────────────────────────
const AUTH_URL  = 'https://lkoqyllmtoodthrtjgfm.supabase.co';
const AUTH_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb3F5bGxtdG9vZHRocnRqZ2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjI4MDAsImV4cCI6MjA5ODk5ODgwMH0.xdPjk-z2HvvLc-mw9b3buZ9Hj1I1ykXFy6cFtRr1isg';
const authSb = supabase.createClient(AUTH_URL, AUTH_ANON);

// ── data (reporting project) ──────────────────────────────────────────────
const DATA_URL  = 'https://fppqqcpgpbdqshhldpth.supabase.co';
const DATA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwcHFxY3BncGJkcXNoaGxkcHRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjc0NDYsImV4cCI6MjA5NjkwMzQ0Nn0._T8DALtq5nRQwj-fjPRWbNwhHX_Hv4TJT__tCdzhH8Q';
const dataClient = supabase.createClient(DATA_URL, DATA_ANON, { auth:{ persistSession:false, autoRefreshToken:false } });

const $ = id => document.getElementById(id);
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const pad = n => String(n).padStart(2,'0');
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtDate = s => { if(!s) return '–'; const [y,m,d]=s.split('-'); return `${+d} ${MONTHS[+m-1]} ${y.slice(2)}`; };
const num = n => (n==null?0:+n).toLocaleString();
const money = n => n==null ? '–' : new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',maximumFractionDigits:0}).format(+n);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// venues with VIP activity (venue_id → name)
const VENUES = [
  { id:'ahNzfnNldmVucm9vbXMtc2VjdXJlchwLEg9uaWdodGxvb3BfVmVudWUYgIDSjrqA3AoM', name:'The Gidley' },
  { id:'ahNzfnNldmVucm9vbXMtc2VjdXJlchwLEg9uaWdodGxvb3BfVmVudWUYgICSvsTR-wkM', name:'Bistecca' },
  { id:'ahNzfnNldmVucm9vbXMtc2VjdXJlchwLEg9uaWdodGxvb3BfVmVudWUYgICSyMSv2gsM', name:"Alfie's" },
];

// ── period ranges (Australian FY, Jul–Jun; quarters FY-aligned Q1 Jul–Sep) ──
const fyLbl = fyStart => `FY${String(fyStart).slice(2)}/${String(fyStart+1).slice(2)}`;
function fyQuarter(fyStart, qIdx){ const sAbs=6+qIdx*3; const start=new Date(fyStart+Math.floor(sAbs/12), sAbs%12, 1); const end=new Date(start.getFullYear(), start.getMonth()+3, 0); return { start:iso(start), end:iso(end), label:`Q${qIdx+1} ${fyLbl(fyStart)}` }; }
function range(kind, fromEl, toEl){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const fyStart = m>=6 ? y : y-1;
  const qIdxNow = Math.floor((((m-6)+12)%12)/3);
  const first=(yy,mm)=>new Date(yy,mm,1), last=(yy,mm)=>new Date(yy,mm+1,0);
  switch(kind){
    case 'tmonth': return { start:iso(first(y,m)), end:iso(last(y,m)), label:`${MONTHS[m]} ${y}` };
    case 'lmonth': { const d=first(y,m-1); return { start:iso(first(d.getFullYear(),d.getMonth())), end:iso(last(d.getFullYear(),d.getMonth())), label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}` }; }
    case 'tquarter': return fyQuarter(fyStart, qIdxNow);
    case 'lquarter': { let qi=qIdxNow-1, fy=fyStart; if(qi<0){qi=3;fy=fyStart-1;} return fyQuarter(fy,qi); }
    case 'tfy': return { start:`${fyStart}-07-01`, end:`${fyStart+1}-06-30`, label:fyLbl(fyStart) };
    case 'lfy': return { start:`${fyStart-1}-07-01`, end:`${fyStart}-06-30`, label:fyLbl(fyStart-1) };
    case 'l5y': { const s=new Date(now); s.setFullYear(s.getFullYear()-5); return { start:iso(s), end:iso(now), label:'Last 5 years' }; }
    case 'custom': { const f=fromEl.value, t=toEl.value; return { start:f||null, end:t||null, label:(f?fmtDate(f):'start')+' – '+(t?fmtDate(t):'today'), custom:true }; }
    default: return { start:null, end:null, label:'All time' };
  }
}

// ── login + permission gate ───────────────────────────────────────────────
async function gate(){
  const { data:{ session } } = await authSb.auth.getSession();
  if(!session){ location.replace('/staff/'); return false; }
  const { data:{ user } } = await authSb.auth.getUser();
  const { data:profile } = await authSb.from('portal_profiles').select('*').eq('id', user.id).maybeSingle();
  if(!profile || !profile.active){ location.replace('/staff/'); return false; }
  // per-app permission — VIP data is sensitive, so enforce at the page too
  let allowed = !!profile.is_super_admin;
  if(!allowed){
    try {
      const { data:ctx } = await authSb.rpc('hub_my_context');
      allowed = !!(ctx && (ctx.super_admin || (ctx.apps && ctx.apps.vips && ctx.apps.vips.includes('view'))));
    } catch(_){ allowed = false; }
  }
  if(!allowed){ location.replace('/staff/'); return false; }
  const name = profile.full_name || profile.email;
  $('whoName').textContent = name;
  $('whoRole').textContent = profile.is_super_admin ? 'Super admin' : '';
  $('avatar').textContent = (name.match(/\b[a-zA-Z]/g) || [name[0]||'?']).slice(0,2).join('').toUpperCase();
  ['whoMeta','avatar','logout'].forEach(id=>$(id).classList.remove('hidden'));
  $('wrap').style.display='block';
  return true;
}
$('logout').onclick = async () => { await authSb.auth.signOut(); location.href='/staff/'; };

// ── chips ─────────────────────────────────────────────────────────────────
function chipsHtml(c){
  if(!c) return '';
  let h='';
  if(c.status) h+=`<span class="tier ${c.status.toLowerCase()}">${esc(c.status)}</span>`;
  if(c.spender) h+=`<span class="tier spend">Spender ${esc(c.spender)}</span>`;
  if(c.important_guest) h+=`<span class="tier imp">Important guest</span>`;
  if(c.critic) h+=`<span class="tier crit">Critic</span>`;
  return h;
}

// ══════════ SCREEN 1 — TOP GUESTS ══════════
let gState = { venues:['all'], filters:new Set(), limit:15, sort:'visits_window', dir:-1, data:null, range:null };
const G_COLS = [
  { key:'_rank', label:'', cls:'rk', sortable:false },
  { key:'name', label:'Guest', sortable:false },
  { key:'visits_window', label:'Visits', cls:'num', sortable:true },
  { key:'avg_cheque', label:'Avg cheque', cls:'num', sortable:true },
  { key:'avg_spend_head', label:'Avg / head', cls:'num', sortable:true },
  { key:'pct_cheques_linked', label:'% w/ cheque', cls:'num', sortable:true },
  { key:'last_booked', label:'Last booked', cls:'num', sortable:true },
  { key:'notes', label:'Notes', sortable:false },
];

function buildVenueChips(){
  const bar=$('venueBar');
  VENUES.forEach(v=>{
    const b=document.createElement('button'); b.className='vchip'; b.dataset.venue=v.id; b.textContent=v.name; bar.appendChild(b);
  });
  bar.addEventListener('click', e=>{
    const b=e.target.closest('.vchip'); if(!b) return;
    const v=b.dataset.venue;
    if(v==='all'){ gState.venues=['all']; }
    else {
      gState.venues = gState.venues.filter(x=>x!=='all');
      const i=gState.venues.indexOf(v);
      if(i>=0) gState.venues.splice(i,1); else gState.venues.push(v);
      if(!gState.venues.length) gState.venues=['all'];
    }
    bar.querySelectorAll('.vchip').forEach(x=>x.classList.toggle('on',
      gState.venues.includes('all') ? x.dataset.venue==='all' : gState.venues.includes(x.dataset.venue)));
    loadGuests();
  });
}

async function loadGuests(){
  const r = range($('gTf').value, $('gFrom'), $('gTo'));
  gState.range = r;
  $('gError').style.display='none'; $('gContent').style.display='none';
  const L=$('gLoading'); L.style.display='flex'; L.textContent='Loading…';
  const venues = gState.venues.includes('all') ? null : gState.venues;
  try {
    const { data, error } = await dataClient.rpc('get_vip_guests', { p_start:r.start, p_end:r.end, p_venues:venues, p_limit:500 });
    if(error) throw new Error(error.message);
    gState.data = data;
    L.style.display='none'; $('gContent').style.display='block';
    renderGuests();
  } catch(err){
    L.style.display='none'; const e=$('gError'); e.style.display='flex'; e.textContent='Could not load data: '+err.message;
  }
}

function renderGuests(){
  if(!gState.data) return;
  const r = gState.range;
  let rows = (gState.data.guests||[]).slice();
  // filters
  const mv = +($('minVisits').value||0);
  if(mv>0) rows = rows.filter(g=>(+g.visits_window||0)>=mv);
  if(gState.filters.has('upcoming')) rows = rows.filter(g=>g.has_upcoming);
  if(gState.filters.has('lapsed')) rows = rows.filter(g=>g.is_lapsed);
  // sort
  const k=gState.sort, dir=gState.dir;
  rows.sort((a,b)=>{
    let av=a[k], bv=b[k];
    if(k==='last_booked'){ av=av||''; bv=bv||''; return av<bv?-dir:av>bv?dir:0; }
    av=av==null?-Infinity:+av; bv=bv==null?-Infinity:+bv;
    return (av-bv)*dir;
  });
  const total=rows.length;
  if(gState.limit>0) rows=rows.slice(0,gState.limit);

  // header
  $('gHead').innerHTML = G_COLS.map(c=>{
    if(!c.sortable) return `<th class="${c.cls||''}">${esc(c.label)}</th>`;
    const on = gState.sort===c.key;
    const arr = on ? (gState.dir<0?' <span class="arrow">▼</span>':' <span class="arrow">▲</span>') : '';
    return `<th class="${c.cls||''} sortable" data-k="${c.key}">${esc(c.label)}${arr}</th>`;
  }).join('');

  const cohort = gState.data.cohort_size || 0;
  $('gSub').textContent = `${total} of ${cohort} VIPs${gState.venues.includes('all')?'':' · '+gState.venues.length+' venue'+(gState.venues.length>1?'s':'')} · ${r.label} · click a guest for full profile`;

  $('gBody').innerHTML = rows.length ? rows.map((g,i)=>{
    const lastCls = g.has_upcoming && g.last_booked && (!g.last_visit_date || g.last_booked>g.last_visit_date) ? 'up' : '';
    return `<tr class="clk" data-id="${esc(g.client_id)}">
      <td class="rk">${i+1}</td>
      <td><div class="gn">${esc(g.name)}</div>
        <div style="margin-top:3px;">${chipsHtml(g.chips)}</div>
        ${g.is_lapsed?'<div class="lapsedTag" style="margin-top:4px;">Lapsed '+num(g.days_since_last_visit)+'d</div>':''}</td>
      <td class="num"><b>${num(g.visits_window)}</b></td>
      <td class="num">${money(g.avg_cheque)}</td>
      <td class="num">${money(g.avg_spend_head)}</td>
      <td class="num">${g.pct_cheques_linked==null?'–':(+g.pct_cheques_linked).toFixed(0)+'%'}</td>
      <td class="num ${lastCls}">${fmtDate(g.last_booked)}${lastCls?' ↗':''}</td>
      <td class="note">${esc((g.notes||'').replace(/\s+/g,' ').slice(0,120))}${(g.notes||'').length>120?'…':''}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="8" style="color:var(--dim);padding:18px 10px;">No VIPs match these filters.</td></tr>';

  $('gFoot').textContent = 'Visits = completed reservations in the selected window. Avg cheque = linked POS cheque totals averaged over visits with a cheque; avg / head divides each cheque by the party that arrived. % with cheque = share of visits (since POS data began Nov 2023) that have a linked cheque. Last booked shows the latest reservation including upcoming (↗). Lapsed = no completed visit in 90+ days and nothing upcoming. Spend figures rely on POS cheques being linked to the booking, so they understate guests whose cheques were not matched.';
}

$('gHead').addEventListener('click', e=>{
  const th=e.target.closest('th.sortable'); if(!th) return;
  const k=th.dataset.k;
  if(gState.sort===k) gState.dir*=-1; else { gState.sort=k; gState.dir=-1; }
  renderGuests();
});
$('gBody').addEventListener('click', e=>{
  const tr=e.target.closest('tr[data-id]'); if(tr) openProfile(tr.dataset.id);
});
$('gTf').onchange = e => {
  const custom = e.target.value==='custom';
  $('gFrom').style.display = custom?'inline-block':'none';
  $('gTo').style.display = custom?'inline-block':'none';
  if(!custom) loadGuests(); else if($('gFrom').value||$('gTo').value) loadGuests();
};
$('gFrom').onchange = loadGuests; $('gTo').onchange = loadGuests;
$('minVisits').oninput = renderGuests;
$('filterBar').addEventListener('click', e=>{
  const b=e.target.closest('.fchip'); if(!b) return;
  const f=b.dataset.f;
  if(gState.filters.has(f)) gState.filters.delete(f); else gState.filters.add(f);
  b.classList.toggle('on'); renderGuests();
});
$('limitSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  $('limitSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); gState.limit=+b.dataset.l; renderGuests();
});

// ── profile modal ──────────────────────────────────────────────────────────
async function openProfile(clientId){
  const g = (gState.data.guests||[]).find(x=>x.client_id===clientId);
  if(!g) return;
  $('mTitle').innerHTML = esc(g.name) + ' ' + chipsHtml(g.chips);
  const contact = [g.email, g.phone_number].filter(Boolean).map(esc).join(' · ');
  const bday = g.birthday_day&&g.birthday_month ? `Birthday ${g.birthday_day} ${MONTHS[g.birthday_month-1]}` : '';
  const anni = g.anniversary_day&&g.anniversary_month ? `Anniversary ${g.anniversary_day} ${MONTHS[g.anniversary_month-1]}` : '';
  $('mSub').textContent = [contact, bday, anni].filter(Boolean).join(' · ');
  $('mBody').innerHTML = `
    <div class="mProfile">
      <div class="mStat"><div class="l">Visits (window)</div><div class="v">${num(g.visits_window)}</div></div>
      <div class="mStat"><div class="l">Avg cheque</div><div class="v">${money(g.avg_cheque)}</div></div>
      <div class="mStat"><div class="l">Avg / head</div><div class="v">${money(g.avg_spend_head)}</div></div>
      <div class="mStat"><div class="l">Lifetime visits</div><div class="v">${num(g.lifetime_visits)}</div></div>
      <div class="mStat"><div class="l">Lifetime spend</div><div class="v">${money(g.lifetime_spend)}</div></div>
      <div class="mStat"><div class="l">Lifetime / cover</div><div class="v">${money(g.lifetime_spend_per_cover)}</div></div>
    </div>
    ${g.notes?`<div class="mNote">${esc(g.notes)}</div>`:''}
    <div id="mBk"><div class="loading" style="min-height:120px;">Loading bookings…</div></div>`;
  $('gModal').style.display='flex'; document.body.style.overflow='hidden';
  try {
    const { data, error } = await dataClient.rpc('get_vip_guest_bookings', { p_client_id:clientId });
    if(error) throw new Error(error.message);
    renderBookings(data||[]);
  } catch(err){
    $('mBk').innerHTML = '<div class="error" style="min-height:100px;">Could not load bookings: '+esc(err.message)+'</div>';
  }
}
function statusPill(s){
  if(s==='Complete') return '<span class="pill completed">Completed</span>';
  if(s==='Incomplete') return '<span class="pill upcoming">Upcoming</span>';
  return `<span class="pill other">${esc(s||'')}</span>`;
}
function renderBookings(bk){
  const done = bk.filter(x=>x.status==='Complete').length;
  const up = bk.filter(x=>x.is_upcoming).length;
  const sub = `${num(bk.length)} booking${bk.length===1?'':'s'} · ${num(done)} completed${up?' · '+num(up)+' upcoming':''}`;
  $('mBk').innerHTML = bk.length ? `
    <div class="panelHead" style="margin:6px 0 12px;"><div class="sub">${sub}</div></div>
    <div class="mScroll"><table class="bk"><thead>
      <tr><th>Date</th><th>Venue</th><th class="num">Party</th><th class="num">Cheque</th><th>Status</th></tr>
    </thead><tbody>${bk.map(x=>`<tr>
      <td>${fmtDate(x.date)}${x.time?` <span class="bc">${esc(x.time)}</span>`:''}</td>
      <td><div class="bn">${esc(x.venue||'')}</div>${x.table_numbers&&x.table_numbers.length?`<div class="bc">T${x.table_numbers.map(esc).join(', ')}</div>`:''}</td>
      <td class="num"><b>${x.party==null?'–':num(x.party)}</b></td>
      <td class="num">${x.cheque_total==null?'–':money(x.cheque_total)}</td>
      <td>${statusPill(x.status)}</td>
    </tr>`).join('')}</tbody></table></div>`
    : '<div class="loading" style="min-height:100px;">No bookings on record.</div>';
}
function closeModal(){ $('gModal').style.display='none'; document.body.style.overflow=''; }
$('mClose').onclick = closeModal;
$('gModal').onclick = e => { if(e.target===$('gModal')) closeModal(); };
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ══════════ SCREEN 2 — BOOKINGS OVER TIME ══════════
let bState = { bucket:'total', data:null, range:null };
async function loadBookings(){
  const r = range($('bTf').value, $('bFrom'), $('bTo'));
  bState.range = r;
  $('bError').style.display='none'; $('bContent').style.display='none';
  const L=$('bLoading'); L.style.display='flex'; L.textContent='Loading…';
  try {
    const { data, error } = await dataClient.rpc('get_vip_booking_metrics', { p_start:r.start, p_end:r.end });
    if(error) throw new Error(error.message);
    bState.data = data;
    L.style.display='none'; $('bContent').style.display='block';
    renderBookingsView();
  } catch(err){
    L.style.display='none'; const e=$('bError'); e.style.display='flex'; e.textContent='Could not load data: '+err.message;
  }
}
function renderBookingsView(){
  if(!bState.data) return;
  const d=bState.data, r=bState.range, b=bState.bucket;
  const s = d.summary[b] || { bookings:0, covers:0, avg_party:null };
  const kpis = [
    ['VIP bookings', num(s.bookings), r.label],
    ['Covers', num(s.covers), s.avg_party!=null?('avg party '+(+s.avg_party).toFixed(1)):''],
    ['Avg party', s.avg_party==null?'–':(+s.avg_party).toFixed(1), 'guests per booking'],
    ['Share of all bookings', (d.summary.vip_share_pct==null?'–':(+d.summary.vip_share_pct).toFixed(1))+'<span class="u">%</span>', num(d.summary.all_bookings)+' bookings group-wide'],
  ];
  $('bKpis').innerHTML = kpis.map(k=>`<div class="kpi"><div class="lab">${k[0]}</div><div class="val">${k[1]}</div><div class="subnote">${esc(k[2])}</div></div>`).join('');

  const monthly = (d.monthly||[]);
  const max = Math.max(1, ...monthly.map(m=>+m.bookings));
  $('bMonthlySub').textContent = monthly.length ? monthly.length+' months' : '';
  $('bMonths').innerHTML = monthly.length ? monthly.map(m=>{
    const [y,mo]=m.month.split('-');
    return `<div class="mcol"><div class="mn">${num(m.bookings)}</div>
      <div class="mbar" style="height:${Math.max(2,(+m.bookings/max)*140)}px" title="${esc(m.month)}: ${num(m.bookings)} bookings, ${num(m.covers)} covers"></div>
      <div class="ml">${MONTHS[+mo-1]} ${y.slice(2)}</div></div>`;
  }).join('') : '<div class="loading">No bookings in this period.</div>';

  $('bFoot').textContent = 'VIP bookings = reservations by guests holding a VIP policy tag. Completed = reservations marked complete; Confirmed + upcoming = future reservations still on the books; Total = both. Covers use the arrived party where known, otherwise the booked party. Share of all bookings compares total VIP bookings to every reservation group-wide in the period. The monthly chart shows total VIP bookings per month.';
}
$('bTf').onchange = e => {
  const custom=e.target.value==='custom';
  $('bFrom').style.display=custom?'inline-block':'none';
  $('bTo').style.display=custom?'inline-block':'none';
  if(!custom) loadBookings(); else if($('bFrom').value||$('bTo').value) loadBookings();
};
$('bFrom').onchange=loadBookings; $('bTo').onchange=loadBookings;
$('bStatusSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  $('bStatusSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); bState.bucket=b.dataset.b; renderBookingsView();
});

// ── view switch ─────────────────────────────────────────────────────────────
let bookingsLoaded=false;
$('viewSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  $('viewSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  const v=b.dataset.v;
  $('viewGuests').style.display = v==='guests'?'block':'none';
  $('viewBookings').style.display = v==='bookings'?'block':'none';
  if(v==='bookings' && !bookingsLoaded){ bookingsLoaded=true; loadBookings(); }
});

// ── boot ────────────────────────────────────────────────────────────────────
(async()=>{ if(await gate()){ buildVenueChips(); loadGuests(); } })();
</script>
