<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Hub — Liquid &amp; Larder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="icon" href="/assets/favicon-light.svg" media="(prefers-color-scheme: light)">
<link rel="icon" href="/assets/favicon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="/styles/core.css?v=3">
<link rel="stylesheet" href="/styles/staff.css?v=3">
<style>
  body { min-height:100vh; }
  .hidden { display:none; }
  .login { max-width:400px; margin:60px auto; padding:34px 30px; border-radius:20px; }
  .tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
  .sectionTitle { color:var(--dim); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; margin:36px 0 16px; font-weight:600; }
  .sectionTitle:first-child { margin-top:0; }
  a.tile { position:relative; display:block; background:var(--card); border:1px solid var(--hairline); border-radius:var(--r-card); box-shadow:var(--shadow-card); padding:26px 28px; color:var(--ink); text-decoration:none; overflow:hidden; transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
  a.tile::before { content:''; position:absolute; inset:0 0 auto 0; height:3px; background:linear-gradient(90deg, var(--sand), rgba(220,209,192,0)); opacity:.9; }
  a.tile:hover { transform:translateY(-3px); border-color:rgba(29,62,59,.22); box-shadow:0 4px 8px rgba(29,62,59,.06), 0 20px 48px -10px rgba(29,62,59,.16); }
  a.tile .name { font-family:'Gilda Display',serif; font-size:19px; margin-bottom:8px; color:var(--green); padding-right:26px; }
  a.tile .desc { color:var(--dim); font-size:12.5px; line-height:1.65; }
  a.tile .go { position:absolute; top:22px; right:22px; width:26px; height:26px; border-radius:50%; background:var(--sand-soft); color:var(--green); display:flex; align-items:center; justify-content:center; font-size:13px; opacity:0; transform:translate(-4px,4px); transition:opacity .18s, transform .18s; }
  a.tile:hover .go { opacity:1; transform:none; }
  td { padding:12px 10px; }
  .roleTag { text-transform:capitalize; }
  .grid3 { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; }
  .who { display:flex; align-items:center; gap:12px; }
  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--green-hi),var(--green)); color:#faf8f4; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
  .who .meta { text-align:right; line-height:1.35; }
  .who .meta .n { font-size:12.5px; font-weight:600; }
  .who .meta .r { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.14em; }
  @media (max-width:700px) { .who .meta { display:none; } }
</style>
</head>
<body>
<header class="topbar">
  <div class="bar">
    <div><h1 class="logo" aria-label="Liquid &amp; Larder"></h1><div class="sub">Staff Hub</div></div>
    <div class="who">
      <div class="meta hidden" id="whoMeta"><div class="n" id="whoName"></div><div class="r" id="whoRole"></div></div>
      <div class="avatar hidden" id="avatar"></div>
      <button class="ghost hidden" id="logout">Sign out</button>
    </div>
  </div>
</header>
<div class="wrap">

  <!-- SET PASSWORD (arriving via invite / reset link) -->
  <div class="card login hidden" id="setPwCard">
    <div class="cardTitle">Welcome — set your password</div>
    <label>New password</label>
    <input id="newPw" type="password" style="margin-bottom:14px">
    <label>Confirm password</label>
    <input id="newPw2" type="password" style="margin-bottom:18px">
    <button id="savePw">Save &amp; enter hub</button>
    <div class="msg" id="pwMsg"></div>
  </div>

  <!-- LOGIN -->
  <div class="card login hidden" id="loginCard">
    <div class="cardTitle">Staff sign in</div>
    <label>Email</label>
    <input id="email" type="email" placeholder="you@liquidandlarder.com.au" style="margin-bottom:14px">
    <label>Password</label>
    <input id="password" type="password" style="margin-bottom:18px">
    <button id="signin">Sign in</button>
    <button class="ghost" id="forgot" style="margin-left:8px">Forgot password</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- APP TILES -->
  <div id="appArea" class="hidden">
    <div id="tiles"></div>
    <div class="msg" id="tilesMsg"></div>

    <!-- ADMIN -->
    <div class="card hidden" id="adminCard" style="margin-top:30px">
      <div class="cardTitle">User management</div>
      <div class="grid3" style="margin-bottom:16px">
        <div><label>Email</label><input id="invEmail" type="email" placeholder="new@liquidandlarder.com.au"></div>
        <div><label>Full name</label><input id="invName" placeholder="optional"></div>
        <div><label>Role</label><select id="invRole">
          <option value="staff">Staff</option><option value="reservations">Reservations</option>
          <option value="manager">Manager</option><option value="finance">Finance</option>
          <option value="admin">Admin</option>
        </select></div>
      </div>
      <button id="invite">Send invite</button>
      <div class="msg" id="invMsg"></div>
      <div style="overflow-x:auto;margin-top:22px"><table>
        <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Status</th><th></th></tr></thead>
        <tbody id="userRows"></tbody>
      </table></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lkoqyllmtoodthrtjgfm.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb3F5bGxtdG9vZHRocnRqZ2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjI4MDAsImV4cCI6MjA5ODk5ODgwMH0.xdPjk-z2HvvLc-mw9b3buZ9Hj1I1ykXFy6cFtRr1isg';
const ADMIN_FN = SUPABASE_URL + '/functions/v1/portal-admin';

const sb = supabase.createClient(SUPABASE_URL, ANON_KEY);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ROLES = ['staff','reservations','manager','finance','admin'];
let myProfile = null;

// Invite/recovery links arrive with a hash like #access_token=...&type=invite
const arrivedViaInvite = /type=(invite|recovery|signup)/.test(location.hash);

async function adminApi(payload) {
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(ADMIN_FN, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'apikey': ANON_KEY,
      ...(session ? { 'Authorization': 'Bearer ' + session.access_token } : {}) },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
  return data;
}

function showOnly(...ids) {
  ['setPwCard','loginCard','appArea'].forEach(id => $(id).classList.toggle('hidden', !ids.includes(id)));
}

async function main() {
  // Give supabase-js a moment to consume the URL hash session on invite links
  const { data: { session } } = await sb.auth.getSession();

  if (session && arrivedViaInvite) { showOnly('setPwCard'); return; }
  if (!session) { showOnly('loginCard'); return; }
  await enter();
}

async function enter() {
  const { data: { user } } = await sb.auth.getUser();
  const { data: profile } = await sb.from('portal_profiles').select('*').eq('id', user.id).maybeSingle();
  if (!profile || !profile.active) {
    showOnly('loginCard');
    $('loginMsg').textContent = 'Your account does not have hub access. Ask an admin to invite you.';
    $('loginMsg').className = 'msg err';
    await sb.auth.signOut();
    return;
  }
  myProfile = profile;
  const displayName = profile.full_name || profile.email;
  $('whoName').textContent = displayName;
  $('whoRole').textContent = profile.role;
  $('avatar').textContent = (displayName.match(/\b[a-zA-Z]/g) || [displayName[0] || '?']).slice(0, 2).join('').toUpperCase();
  ['whoMeta', 'avatar', 'logout'].forEach(id => $(id).classList.remove('hidden'));
  showOnly('appArea');

  const { data: apps, error } = await sb.from('portal_apps').select('*').order('sort_order');
  if (error) { $('tilesMsg').textContent = error.message; $('tilesMsg').className = 'msg err'; return; }
  const SECTION_ORDER = ['Accounts', 'Company metrics'];
  const groups = {};
  (apps || []).forEach(a => { const s = a.section || 'General'; (groups[s] = groups[s] || []).push(a); });
  const sections = Object.keys(groups).sort((a, b) => {
    const ia = SECTION_ORDER.indexOf(a), ib = SECTION_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib) || a.localeCompare(b);
  });
  const tile = a => `
    <a class="tile" href="${esc(a.url)}"${a.url.startsWith('http') ? ' target="_blank" rel="noopener"' : ''}>
      <span class="go" aria-hidden="true">&#8599;</span>
      <div class="name">${esc(a.name)}</div>
      <div class="desc">${esc(a.description || '')}</div>
    </a>`;
  $('tiles').innerHTML = sections.map(s =>
    `<div class="sectionTitle">${esc(s)}</div><div class="tiles">` + groups[s].map(tile).join('') + '</div>'
  ).join('') || '<span class="dim">No dashboards available for your role yet.</span>';

  if (profile.role === 'admin') { $('adminCard').classList.remove('hidden'); loadUsers(); }
}

// ---- auth actions ----
$('signin').onclick = async () => {
  $('loginMsg').textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email: $('email').value.trim(), password: $('password').value });
  if (error) { $('loginMsg').textContent = error.message; $('loginMsg').className = 'msg err'; return; }
  enter();
};
$('forgot').onclick = async () => {
  const email = $('email').value.trim();
  if (!email) { $('loginMsg').textContent = 'Enter your email first.'; $('loginMsg').className = 'msg err'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
  $('loginMsg').textContent = error ? error.message : 'Reset link sent — check your email.';
  $('loginMsg').className = 'msg ' + (error ? 'err' : 'ok');
};
$('savePw').onclick = async () => {
  const p1 = $('newPw').value, p2 = $('newPw2').value;
  if (p1.length < 8) { $('pwMsg').textContent = 'Use at least 8 characters.'; $('pwMsg').className = 'msg err'; return; }
  if (p1 !== p2) { $('pwMsg').textContent = 'Passwords do not match.'; $('pwMsg').className = 'msg err'; return; }
  const { error } = await sb.auth.updateUser({ password: p1 });
  if (error) { $('pwMsg').textContent = error.message; $('pwMsg').className = 'msg err'; return; }
  history.replaceState(null, '', location.pathname);
  enter();
};
$('logout').onclick = async () => { await sb.auth.signOut(); location.reload(); };

// ---- admin ----
$('invite').onclick = async () => {
  const m = $('invMsg'); m.textContent = ''; m.className = 'msg';
  try {
    $('invite').disabled = true;
    await adminApi({
      action: 'invite',
      email: $('invEmail').value.trim(),
      full_name: $('invName').value.trim(),
      role: $('invRole').value,
      redirect_to: location.origin + location.pathname,
    });
    m.textContent = 'Invite sent.'; m.className = 'msg ok';
    $('invEmail').value = ''; $('invName').value = '';
    loadUsers();
  } catch (e) { m.textContent = e.message; m.className = 'msg err'; }
  finally { $('invite').disabled = false; }
};

async function loadUsers() {
  const { data: users, error } = await sb.from('portal_profiles').select('*').order('created_at');
  if (error) return;
  $('userRows').innerHTML = (users || []).map(u => `
    <tr>
      <td>${esc(u.email)}</td>
      <td>${u.full_name ? esc(u.full_name) : '<span class="dim">—</span>'}</td>
      <td><select class="roleSel" data-id="${u.id}" style="width:auto;padding:6px 8px;font-size:12px" ${u.id === myProfile.id ? 'disabled' : ''}>
        ${ROLES.map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${r}</option>`).join('')}
      </select></td>
      <td>${u.active ? '<span style="color:var(--ok)">active</span>' : '<span style="color:var(--err)">disabled</span>'}</td>
      <td style="white-space:nowrap">
        ${u.id !== myProfile.id ? `
          <button class="ghost" onclick="toggleActive('${u.id}', ${!u.active})">${u.active ? 'Disable' : 'Enable'}</button>
          <button class="danger" onclick="removeUser('${u.id}', '${esc(u.email)}')">Remove</button>` : '<span class="dim">you</span>'}
      </td>
    </tr>`).join('');
  document.querySelectorAll('.roleSel').forEach(sel => sel.onchange = async () => {
    await sb.from('portal_profiles').update({ role: sel.value }).eq('id', sel.dataset.id);
    loadUsers();
  });
}
window.toggleActive = async (id, active) => {
  await sb.from('portal_profiles').update({ active }).eq('id', id);
  loadUsers();
};
window.removeUser = async (id, email) => {
  if (!confirm('Remove ' + email + ' entirely? They will no longer be able to sign in.')) return;
  try { await adminApi({ action: 'remove', id }); loadUsers(); }
  catch (e) { $('invMsg').textContent = e.message; $('invMsg').className = 'msg err'; }
};

// supabase-js fires SIGNED_IN after consuming an invite hash; re-run main then
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN' && arrivedViaInvite) showOnly('setPwCard');
});
main();
</script>
</body>
</html>
