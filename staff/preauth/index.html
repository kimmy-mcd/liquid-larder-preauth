<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Authorisations — Liquid &amp; Larder Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="icon" href="/assets/favicon-light.svg" media="(prefers-color-scheme: light)">
<link rel="icon" href="/assets/favicon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="/styles/core.css?v=1">
<link rel="stylesheet" href="/styles/staff.css?v=2">
<style>
  .wrap { max-width:1100px; }
  .sub { margin-bottom:28px; }
  .sub a { color:var(--sand-dim); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; }
  td { padding:12px 10px; }
  .chip { display:inline-block; padding:4px 12px; border:1px solid; border-radius:999px; font-size:10px; letter-spacing:.14em; text-transform:uppercase; }
  .chip.sent { color:var(--sand-dim); border-color:var(--sand-dim); }
  .chip.card_saved { color:var(--ok); border-color:var(--ok); }
  .chip.hold_placed { color:var(--info); border-color:var(--info); }
  .chip.hold_failed, .chip.cancelled, .chip.expired { color:var(--err); border-color:var(--err); }
  .chip.charged { color:var(--ok); border-color:var(--ok); }
  .chip.released { color:var(--sand-dim); border-color:var(--line); }
  select.inline { width:auto; padding:7px 9px; font-size:11px; }
  @media (max-width:700px) { .desktop-only { display:none; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div><h1 class="logo" aria-label="Liquid &amp; Larder"></h1><div class="sub"><a href="../">&larr; Portal</a> &nbsp;·&nbsp; Credit Card Pre-Authorisations</div></div>
  </div>

  <div id="appArea">
    <div class="card">
      <div class="cardTitle">New pre-authorisation request</div>
      <div class="grid">
        <div><label>Venue</label><select id="venue">
          <option>Alfie's</option><option>Bistecca</option>
          <option>The Gidley</option>
          <option>Liquid &amp; Larder</option>
        </select></div>
        <div><label>Guest name</label><input id="gname" placeholder="Jane Citizen"></div>
        <div><label>Guest email</label><input id="gemail" type="email" placeholder="optional"></div>
        <div><label>Guest mobile</label><input id="gphone" placeholder="optional"></div>
        <div><label>Date of use</label><input id="bdate" type="date"></div>
        <div><label>Maximum amount (AUD)</label><input id="maxamt" type="number" min="1" step="0.01" placeholder="e.g. 2000"></div>
        <div style="grid-column:1/-1"><label>Purpose of hold</label><input id="notes" placeholder="What is the card hold for? e.g. Private dining room hire + food &amp; beverage — Smith party of 12"></div>
      </div>
      <div style="margin-top:18px"><button id="create">Create &amp; get link</button></div>
      <div class="msg" id="createMsg"></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span class="cardTitle" style="margin-bottom:0">Requests</span>
        <span>
          <select id="filterStatus" class="inline">
            <option value="">All statuses</option><option value="sent">Sent</option>
            <option value="card_saved">Card saved</option><option value="hold_placed">Hold placed</option>
            <option value="hold_failed">Hold failed</option><option value="charged">Charged</option>
            <option value="cancelled">Cancelled</option><option value="expired">Expired</option>
          </select>
          <button class="ghost" id="refresh">Refresh</button>
        </span>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>Guest</th><th>Venue</th><th>Date of use</th><th>Max</th><th>Status</th>
          <th class="desktop-only">Created</th><th class="desktop-only">Card</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table></div>
      <div class="msg" id="listMsg"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lkoqyllmtoodthrtjgfm.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb3F5bGxtdG9vZHRocnRqZ2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjI4MDAsImV4cCI6MjA5ODk5ODgwMH0.xdPjk-z2HvvLc-mw9b3buZ9Hj1I1ykXFy6cFtRr1isg';
const PAY_URL = new URL('../..', location.href).href; // customer page at site root
const FN = SUPABASE_URL + '/functions/v1/preauth-staff';

const sb = supabase.createClient(SUPABASE_URL, ANON_KEY);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = c => new Intl.NumberFormat('en-AU', { style:'currency', currency:'AUD' }).format(c / 100);
// All event times are stored in UTC and displayed in Sydney time (AEST/AEDT)
const fmtTs = ts => ts ? new Date(ts).toLocaleString('en-AU', {
  timeZone:'Australia/Sydney', day:'2-digit', month:'2-digit', year:'2-digit', hour:'numeric', minute:'2-digit', hour12:true,
}) : '';
// The moment the current status happened: card saved -> terms acceptance; later states -> last update
const statusTime = r => r.status === 'sent' ? r.created_at : (r.status === 'card_saved' ? r.terms_accepted_at : r.updated_at);

// Theme follows the preference saved via the portal (cached locally for instant paint)
document.documentElement.dataset.theme = localStorage.getItem('ll_theme') || 'dark';
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const { data } = await sb.from('portal_prefs').select('theme').eq('user_id', session.user.id).maybeSingle();
  if (data?.theme) { document.documentElement.dataset.theme = data.theme; localStorage.setItem('ll_theme', data.theme); }
})();

// Must be signed in via the portal — session is shared across the site origin
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = '../'; return; }
  loadList();
})();

async function api(payload) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = '../'; throw new Error('Signed out'); }
  const res = await fetch(FN, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + session.access_token },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || 'Request failed');
  return data;
}

// ---- create ----
$('create').onclick = async () => {
  const m = $('createMsg'); m.textContent = ''; m.className = 'msg';
  try {
    if (!$('notes').value.trim()) throw new Error('Please enter what this hold is for — the venue team needs it to identify the account when charging.');
    $('create').disabled = true;
    const { request } = await api({
      action: 'create',
      venue_name: $('venue').value,
      guest_name: $('gname').value.trim(),
      guest_email: $('gemail').value.trim(),
      guest_phone: $('gphone').value.trim(),
      booking_date: $('bdate').value,
      max_amount: $('maxamt').value,
      notes: $('notes').value.trim(),
    });
    const link = PAY_URL + '?t=' + request.token;
    await navigator.clipboard.writeText(link).catch(() => {});
    m.innerHTML = 'Created — link copied to clipboard:<br><span style="color:var(--sand)">' + esc(link) + '</span>';
    m.className = 'msg ok';
    ['gname','gemail','gphone','bdate','maxamt','notes'].forEach(id => $(id).value = '');
    loadList();
  } catch (e) { m.textContent = e.message; m.className = 'msg err'; }
  finally { $('create').disabled = false; }
};

// ---- list ----
async function loadList() {
  const m = $('listMsg'); m.textContent = '';
  try {
    const payload = { action: 'list' };
    if ($('filterStatus').value) payload.status = $('filterStatus').value;
    const { requests } = await api(payload);
    $('rows').innerHTML = requests.map(r => `
      <tr>
        <td>${esc(r.guest_name)}${r.guest_email ? '<br><span class="dim">' + esc(r.guest_email) + '</span>' : ''}</td>
        <td>${esc(r.venue_name)}${r.notes ? '<br><span class="dim">' + esc(r.notes) + '</span>' : ''}</td>
        <td>${new Date(r.booking_date + 'T00:00:00').toLocaleDateString('en-AU')}${r.booking_time ? '<br><span class="dim">' + esc(r.booking_time) + '</span>' : ''}</td>
        <td>${fmt(r.max_amount_cents)}</td>
        <td><span class="chip ${esc(r.status)}">${esc(r.status.replace('_',' '))}</span>${r.status !== 'sent' && statusTime(r) ? '<br><span class="dim">' + fmtTs(statusTime(r)) + '</span>' : ''}${r.status === 'hold_failed' && r.hold_last_error ? '<br><span class="dim">' + esc(r.hold_last_error) + '</span>' : ''}</td>
        <td class="desktop-only dim">${fmtTs(r.created_at)}</td>
        <td class="desktop-only">${r.card_brand ? esc(r.card_brand) + ' •••• ' + esc(r.card_last4) : '—'}</td>
        <td style="white-space:nowrap">
          <button class="ghost" onclick="copyLink('${esc(r.token)}')">Copy link</button>
          ${['sent','card_saved'].includes(r.status) ? `<button class="danger" onclick="cancelReq('${esc(r.id)}')">Cancel</button>` : ''}
        </td>
      </tr>`).join('') || '<tr><td colspan="8" class="dim">No requests yet.</td></tr>';
  } catch (e) {
    // Staff-role users get a clean "no access" state instead of a broken form
    if (/role does not include/i.test(e.message)) { showNoAccess(); return; }
    m.textContent = e.message; m.className = 'msg err';
  }
}
function showNoAccess() {
  $('appArea').innerHTML = `
    <div class="card" style="text-align:center;padding:48px 24px">
      <div class="cardTitle" style="margin-bottom:10px">No access</div>
      <p class="dim" style="margin:0 0 18px">Your portal role doesn&#39;t include credit card pre-authorisations.<br>
      If you think it should, ask an administrator to update your role.</p>
      <a href="../"><button class="ghost">&larr; Back to portal</button></a>
    </div>`;
}
window.copyLink = t => navigator.clipboard.writeText(PAY_URL + '?t=' + t);
window.cancelReq = async id => {
  if (!confirm('Cancel this pre-authorisation request?')) return;
  try { await api({ action: 'cancel', id }); loadList(); }
  catch (e) { $('listMsg').textContent = e.message; $('listMsg').className = 'msg err'; }
};
$('refresh').onclick = loadList;
$('filterStatus').onchange = loadList;
</script>
</body>
</html>
